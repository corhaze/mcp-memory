<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Memory Explorer</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <aside>
        <h1>Memory Bank</h1>
        <ul class="project-list" id="projectList">
            <li class="project-item active">Loading projects...</li>
        </ul>
    </aside>

    <main>
        <header>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('context')">Context</div>
                <div class="tab" onclick="switchTab('timeline')">Timeline</div>
                <div class="tab" onclick="switchTab('insights')">Insights</div>
                <div class="tab" onclick="switchTab('todos')">Todos</div>
            </div>
            <div id="currentProjectLabel" style="font-weight: 600; color: var(--accent-color)"></div>
        </header>

        <section class="content-viewer" id="contentViewer">
            <!-- Content will be injected here -->
        </section>
    </main>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <h2>Delete Project?</h2>
            <p>This will permanently remove all memory bank data for <strong id="deleteProjectName"></strong>. This
                action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Delete Project</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
